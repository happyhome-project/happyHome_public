name: nightly-full

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

concurrency:
  group: happyhome-nightly
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: [self-hosted, Windows, X64]
    environment: nightly
    defaults:
      run:
        shell: powershell
    env:
      CLOUD_API_URL: ${{ secrets.CLOUD_API_URL }}
      GATEWAY_TOKEN: ${{ secrets.GATEWAY_TOKEN }}
      TEST_COMMUNITY_ID: ${{ secrets.TEST_COMMUNITY_ID }}
      VITE_CLOUD_API_URL: ${{ secrets.VITE_CLOUD_API_URL }}
      VITE_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}
      VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
      TEST_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}
      TEST_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
      WECHAT_DEVTOOLS_PORT: ${{ secrets.WECHAT_DEVTOOLS_PORT }}
      WECHAT_DEVTOOLS_CLI_PATH: ${{ secrets.WECHAT_DEVTOOLS_CLI_PATH }}
      WECHAT_DEVTOOLS_PROJECT_PATH: ${{ secrets.WECHAT_DEVTOOLS_PROJECT_PATH }}
      WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin and verify toolchain
        run: |
          npm.cmd install --global npm@11.11.0
          $nodeVersion = node --version
          if ($nodeVersion -notmatch '^v24\.') {
            throw "Expected Node v24.x, got $nodeVersion"
          }
          $npmVersion = npm.cmd --version
          if ($npmVersion -ne '11.11.0') {
            throw "Expected npm 11.11.0, got $npmVersion"
          }
          Write-Output "node=$nodeVersion npm=$npmVersion"

      - name: Run nightly orchestration
        run: npm.cmd run test:nightly

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-full-artifacts
          path: artifacts
          if-no-files-found: warn
