name: pr-ci

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  offline:
    name: offline
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.1

      - name: Configure exact npm cache
        run: |
          $npmCache = Join-Path $env:RUNNER_TEMP 'npm-cache'
          "npm_config_cache=$npmCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NPM_CACHE_DIR=$npmCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore exact npm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/npm-cache
          key: ${{ runner.os }}-${{ runner.arch }}-node-24.14.1-npm-11.11.0-${{ hashFiles('package-lock.json') }}

      - name: Classify CI impact
        id: impact
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            node scripts/ci-impact.mjs --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}
          } else {
            Write-Output "Running full integration validation for merge group"
            @(
              'full=true'
              'install=true'
              'cloud=true'
              'admin=true'
              'miniprogram=true'
              'deployOutput=true'
              'docs=true'
              'governance=true'
              'releasePlan=true'
            ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Check change whitespace
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            git diff --check ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
          } else {
            git diff --check ${{ github.event.merge_group.base_sha }} ${{ github.event.merge_group.head_sha }}
          }

      - name: Report lane and component plan
        run: |
          $componentJson = node --input-type=module -e "import { RELEASE_COMPONENTS } from './scripts/lib/release-component-registry.mjs'; process.stdout.write(JSON.stringify(RELEASE_COMPONENTS))"
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to read the governed release component registry"
          }
          $releaseComponents = @($componentJson | ConvertFrom-Json)
          $cloudComponents = [string]::Join(', ', @($releaseComponents | Where-Object { $_ -like 'cloud:*' }))
          $policyFlags = @(
            "docs=${{ steps.impact.outputs.docs }}"
          )
          $policyEnabled = $policyFlags -match '=true$'
          $failFastFlags = @(
            "deployOutput=${{ steps.impact.outputs.deployOutput }}"
            "governance=${{ steps.impact.outputs.governance }}"
            "releasePlan=${{ steps.impact.outputs.releasePlan }}"
          )
          $failFastEnabled = $failFastFlags -match '=true$'
          $plan = @(
            [pscustomobject]@{ Lane = 'fail-fast-policy'; Enabled = [bool]$failFastEnabled; Components = 'governance, artifact-manifest, release-plan'; Reason = if ($failFastEnabled) { "selected: $($failFastFlags -join ', ')" } else { "skipped: $($failFastFlags -join ', ')" } }
            [pscustomobject]@{ Lane = 'policy'; Enabled = [bool]$policyEnabled; Components = 'docs'; Reason = if ($policyEnabled) { "selected: $($policyFlags -join ', ')" } else { "skipped: $($policyFlags -join ', ')" } }
            [pscustomobject]@{ Lane = 'cloud'; Enabled = '${{ steps.impact.outputs.cloud }}' -eq 'true'; Components = $cloudComponents; Reason = if ('${{ steps.impact.outputs.cloud }}' -eq 'true') { 'selected: ci-impact cloud=true' } else { 'skipped: ci-impact cloud=false' } }
            [pscustomobject]@{ Lane = 'admin'; Enabled = '${{ steps.impact.outputs.admin }}' -eq 'true'; Components = [string]::Join(', ', @($releaseComponents | Where-Object { $_ -eq 'admin-web' })); Reason = if ('${{ steps.impact.outputs.admin }}' -eq 'true') { 'selected: ci-impact admin=true' } else { 'skipped: ci-impact admin=false' } }
            [pscustomobject]@{ Lane = 'miniprogram'; Enabled = '${{ steps.impact.outputs.miniprogram }}' -eq 'true'; Components = [string]::Join(', ', @($releaseComponents | Where-Object { $_ -eq 'miniprogram' })); Reason = if ('${{ steps.impact.outputs.miniprogram }}' -eq 'true') { 'selected: ci-impact miniprogram=true' } else { 'skipped: ci-impact miniprogram=false' } }
          )
          $rendered = $plan | Format-Table -AutoSize | Out-String
          Write-Output $rendered
          @(
            '## Offline CI lane and component plan'
            ''
            '```text'
            $rendered.TrimEnd()
            '```'
          ) | Add-Content -Encoding utf8 $env:GITHUB_STEP_SUMMARY

      - name: Pin and verify toolchain
        if: steps.impact.outputs.install == 'true'
        run: |
          npm.cmd install --global npm@11.11.0
          $nodeVersion = node --version
          if ($nodeVersion -ne 'v24.14.1') {
            throw "Expected Node v24.14.1, got $nodeVersion"
          }
          $npmVersion = npm.cmd --version
          if ($npmVersion -ne '11.11.0') {
            throw "Expected npm 11.11.0, got $npmVersion"
          }
          Write-Output "node=$nodeVersion npm=$npmVersion"

      - name: Install dependencies
        if: steps.impact.outputs.install == 'true'
        run: npm.cmd ci

      - name: Run fail-fast governance manifest and release-plan policy
        run: |
          function Invoke-FailFastPolicy {
            param([string]$Label, [string]$File, [string[]]$Arguments)
            $timer = [System.Diagnostics.Stopwatch]::StartNew()
            Write-Output "::group::fail-fast-policy: $Label"
            try {
              & $File @Arguments
              if ($LASTEXITCODE -ne 0) {
                throw "$Label failed with exit code $LASTEXITCODE"
              }
            } finally {
              $timer.Stop()
              Write-Output "::endgroup::"
              Write-Output "[fail-fast-policy] $Label seconds=$([math]::Round($timer.Elapsed.TotalSeconds, 3))"
            }
          }

          if ('${{ steps.impact.outputs.governance }}' -eq 'true') {
            Invoke-FailFastPolicy 'governance policy' 'npm.cmd' @('run', 'test:governance')
          } else {
            Write-Output '[fail-fast-policy] skipped governance: ci-impact governance=false'
          }
          if ('${{ steps.impact.outputs.deployOutput }}' -eq 'true') {
            Invoke-FailFastPolicy 'artifact manifest and deploy-output policy' 'npm.cmd' @('run', 'test:deploy-output')
          } else {
            Write-Output '[fail-fast-policy] skipped artifact manifest and deploy-output: ci-impact deployOutput=false'
          }
          if ('${{ steps.impact.outputs.releasePlan }}' -eq 'true') {
            node -e "const {scripts = {}} = require('./package.json'); process.exit(scripts['release:plan'] ? 0 : 1)"
            if ($LASTEXITCODE -eq 0) {
              if ('${{ github.event_name }}' -eq 'pull_request') {
                $baseSha = '${{ github.event.pull_request.base.sha }}'
                $headSha = '${{ github.event.pull_request.head.sha }}'
              } else {
                $baseSha = '${{ github.event.merge_group.base_sha }}'
                $headSha = '${{ github.event.merge_group.head_sha }}'
              }
              Invoke-FailFastPolicy 'release-plan policy' 'npm.cmd' @('run', 'release:plan', '--', '--mode=pr', "--base=$baseSha", "--head=$headSha")
              $planPath = Join-Path '.codex-local/release-plans' "pr-$headSha.json"
              $releasePlan = Get-Content -Raw -Encoding utf8 $planPath | ConvertFrom-Json
              $targets = $releasePlan.targets | ConvertTo-Json -Depth 8 -Compress
              $operationKinds = $releasePlan.operationKinds | ConvertTo-Json -Depth 8 -Compress
              Write-Output "[release-plan] targets=$targets"
              Write-Output "[release-plan] operationKinds=$operationKinds"
              @(
                ''
                '## PR release policy plan'
                ''
                "- Targets: ``$targets``"
                "- Operation kinds: ``$operationKinds``"
                '- Scope: this offline CI plan does not claim remote deploy skips or component-digest attestation.'
              ) | Add-Content -Encoding utf8 $env:GITHUB_STEP_SUMMARY
            } else {
              Write-Output 'release:plan is not installed yet; skipping PR release-plan generation'
              & cmd.exe /c exit 0
            }
          } else {
            Write-Output '[fail-fast-policy] skipped release plan: ci-impact releasePlan=false'
            Add-Content -Encoding utf8 $env:GITHUB_STEP_SUMMARY '- Release plan skipped by ci-impact; this offline CI does not claim remote deploy skips or component-digest attestation.'
          }

      - name: Run bounded lanes and aggregate offline result
        run: |
          $laneSpecs = @(
            [pscustomobject]@{
              Order = 0; Name = 'policy'
              Enabled = '${{ steps.impact.outputs.docs }}' -eq 'true'
              Docs = '${{ steps.impact.outputs.docs }}' -eq 'true'
              SkipReason = 'ci-impact docs=false'
            }
            [pscustomobject]@{ Order = 1; Name = 'cloud'; Enabled = '${{ steps.impact.outputs.cloud }}' -eq 'true'; SkipReason = 'ci-impact cloud=false' }
            [pscustomobject]@{ Order = 2; Name = 'admin'; Enabled = '${{ steps.impact.outputs.admin }}' -eq 'true'; SkipReason = 'ci-impact admin=false' }
            [pscustomobject]@{ Order = 3; Name = 'miniprogram'; Enabled = '${{ steps.impact.outputs.miniprogram }}' -eq 'true'; SkipReason = 'ci-impact miniprogram=false' }
          )

          $results = @($laneSpecs | ForEach-Object -Parallel {
            $lane = $_
            $timer = [System.Diagnostics.Stopwatch]::StartNew()
            if (-not $lane.Enabled) {
              $timer.Stop()
              return [pscustomobject]@{ Order = $lane.Order; Lane = $lane.Name; Status = 'skipped'; Seconds = [math]::Round($timer.Elapsed.TotalSeconds, 3); Detail = $lane.SkipReason }
            }

            function Invoke-Checked {
              param([string]$Label, [string]$File, [string[]]$Arguments)
              Write-Host "::group::$($lane.Name): $Label"
              try {
                & $File @Arguments 2>&1 | ForEach-Object { Write-Host $_ }
                $exitCode = $LASTEXITCODE
                if ($exitCode -ne 0) {
                  throw "$Label failed with exit code $exitCode"
                }
              } finally {
                Write-Host '::endgroup::'
              }
            }

            try {
              switch ($lane.Name) {
                'policy' {
                  if ($lane.Docs) { Invoke-Checked 'documentation policy' 'npm.cmd' @('run', 'docs:check') }
                }
                'cloud' {
                  Invoke-Checked 'cloud tests' 'npm.cmd' @('--workspace', 'cloud', 'test')
                  Invoke-Checked 'cloud build' 'npm.cmd' @('--workspace', 'cloud', 'run', 'build')
                }
                'admin' {
                  Invoke-Checked 'admin type-check' 'npm.cmd' @('--workspace', 'admin-web', 'run', 'type-check')
                  Invoke-Checked 'admin build' 'npm.cmd' @('--workspace', 'admin-web', 'run', 'build')
                }
                'miniprogram' {
                  Invoke-Checked 'miniprogram type-check' 'npm.cmd' @('--workspace', 'miniprogram', 'run', 'type-check')
                  Invoke-Checked 'miniprogram unit tests' 'npm.cmd' @('--workspace', 'miniprogram', 'run', 'test:unit')
                  Invoke-Checked 'miniprogram build' 'npm.cmd' @('--workspace', 'miniprogram', 'run', 'build:mp-weixin')
                }
              }
              $timer.Stop()
              [pscustomobject]@{ Order = $lane.Order; Lane = $lane.Name; Status = 'passed'; Seconds = [math]::Round($timer.Elapsed.TotalSeconds, 3); Detail = 'selected checks passed' }
            } catch {
              $timer.Stop()
              [pscustomobject]@{ Order = $lane.Order; Lane = $lane.Name; Status = 'failed'; Seconds = [math]::Round($timer.Elapsed.TotalSeconds, 3); Detail = $_.Exception.Message.Replace("`r", ' ').Replace("`n", ' ') }
            }
          } -ThrottleLimit 4)

          $results = @($results | Sort-Object Order)
          $rendered = $results | Select-Object Lane, Status, Seconds, Detail | Format-Table -AutoSize | Out-String
          Write-Output $rendered
          @(
            ''
            '## Offline CI lane results'
            ''
            '```text'
            $rendered.TrimEnd()
            '```'
          ) | Add-Content -Encoding utf8 $env:GITHUB_STEP_SUMMARY

          $failed = @($results | Where-Object { $_.Status -eq 'failed' })
          if ($failed.Count -gt 0) {
            throw "Offline CI failed in lane(s): $([string]::Join(', ', @($failed.Lane)))"
          }
