name: pr-ci

on:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  offline:
    name: offline
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin and verify toolchain
        run: |
          npm.cmd install --global npm@11.11.0
          $nodeVersion = node --version
          if ($nodeVersion -notmatch '^v24\.') {
            throw "Expected Node v24.x, got $nodeVersion"
          }
          $npmVersion = npm.cmd --version
          if ($npmVersion -ne '11.11.0') {
            throw "Expected npm 11.11.0, got $npmVersion"
          }
          Write-Output "node=$nodeVersion npm=$npmVersion"

      - name: Install dependencies
        run: npm.cmd ci

      - name: Test cloud
        run: npm --workspace cloud test

      - name: Build cloud
        run: npm --workspace cloud run build

      - name: Type-check admin
        run: npm --workspace admin-web run type-check

      - name: Build admin
        run: npm --workspace admin-web run build

      - name: Type-check miniprogram
        run: npm --workspace miniprogram run type-check

      - name: Unit test miniprogram
        run: npm --workspace miniprogram run test:unit

      - name: Build miniprogram
        run: npm --workspace miniprogram run build:mp-weixin

      - name: Test deploy output policy
        run: npm run test:deploy-output

      - name: Check docs
        run: npm.cmd run docs:check

      - name: Test governance
        run: npm.cmd run test:governance

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Check merge group whitespace
        if: github.event_name == 'merge_group'
        run: git diff --check ${{ github.event.merge_group.base_sha }} ${{ github.event.merge_group.head_sha }}

      - name: Plan PR release
        run: |
          node -e "const {scripts = {}} = require('./package.json'); process.exit(scripts['release:plan'] ? 0 : 1)"
          if ($LASTEXITCODE -eq 0) {
            npm run release:plan -- --mode=pr
          } else {
            Write-Output "release:plan is not installed yet; skipping PR release-plan generation"
            exit 0
          }
